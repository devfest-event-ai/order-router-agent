name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Test Suite
      run: |
        python tests/test_payment_validation.py
        python tests/test_inventory.py
        python tests/test_geo_routing.py
        python tests/test_fraud_rules.py
        python tests/test_audit_log.py
        python tests/test_e2e.py
        python tests/test_webhook.py
        python tests/test_async_processing.py
        python tests/test_monitoring.py